openapi: 3.0.3
info:
  title: Portfolio Apis Docs
  description: >-
    # Portfolio.app
  version: 1.3.1
  contact: {}
servers:
  - url: ${{server}}
paths: 
  /auth/signup:
  post:
    summary: Register new user
    tags:
      - Authentication
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - Name
              - Email
              - Password
            properties:
              Name:
                type: string
                example: Firoz Ansari
              Email:
                type: string
                format: email
                example: firoz@gmail.com
              Password:
                type: string
                format: password
                example: Password@123
    responses:
      "201":
        description: OTP sent successfully
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiResponse'


  /auth/verify-email:
    post:
      summary: Verify email using OTP
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - Email
                - OTP
              properties:
                Email:
                  type: string
                  example: firoz@gmail.com
                OTP:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: Email verified successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        summary: Verify user's email using token
        tags:
          - Authentication
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - token
                properties:
                  token:
                    type: string
                    description: JWT email verification token
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        responses:
          "200":
            description: Email verified successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ApiResponse'
          "400":
            description: Invalid or expired token
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ApiError'

  /auth/resend-otp:
    post:
      summary: Resend email verification OTP
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - Email
              properties:
                Email:
                  type: string
                  format: email
                  example: firoz@gmail.com
      responses:
        "200":
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'


  /auth/login:
    post:
      summary: Login user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - Email
                - Password
              properties:
                Email:
                  type: string
                  format: email
                  example: firoz@gmail.com
                Password:
                  type: string
                  format: password
                  example: Password@123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'


      summary: Login user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - Email
                - Password
              properties:
                Email:
                  type: string
                  format: email
                  example: john@example.com
                Password:
                  type: string
                  format: password
                  example: MySecurePass123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "400":
          description: Invalid email, password, or email not verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/forgot-password:
    post:
      summary: Send password reset OTP
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - Email
              properties:
                Email:
                  type: string
                  format: email
                  example: firoz@gmail.com
      responses:
        "200":
          description: Password reset OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'


  /auth/reset-password:
    post:
      summary: Reset password using OTP
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - Email
                - OTP
                - Password
              properties:
                Email:
                  type: string
                  example: firoz@gmail.com
                OTP:
                  type: string
                  example: "123456"
                Password:
                  type: string
                  format: password
                  example: NewPassword@123
      responses:
        "200":
          description: Password updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'


  /auth/refresh-token:
    post:
      summary: Refresh access token
      tags:
        - Authentication
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI...
      responses:
        "200":
          description: Access token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

                
      tags: 
        - Authentication
      summary: Refresh access token
      description: >
        Generates a new **access token** and **refresh token** if the provided refresh token is valid.
        <br><br>
        You can send the refresh token through one of these:
        - **Cookie:** `refreshToken`
        - **Header:** `X-Authorization-Refresh`
        - **Body:** `{ "refreshToken": "<token>" }`
      parameters:
        - name: X-Authorization-Refresh
          in: header
          required: false
          schema:
            type: string
          description: Refresh token sent via custom header
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  description: Refresh token sent in the request body
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Access token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  statusCode:
                    type: integer
                    example: 200
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6...
                      refreshToken:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6...
                  message:
                    type: string
                    example: Access token refreshed
        '401':
          description: Unauthorized — Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'

  /auth/me:
    get:
      summary: Get logged in user
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged in user fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      summary: Logout user
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        "401":
          description: Unauthorized


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Include your access token as:
        ```
        Authorization: Bearer <access_token>
        ```

  schemas:
    ApiResponse:
      type: object
      properties:
        IsSuccess:
          type: boolean
          example: true
        Message:
          type: string
          example: User registered successfully
        Data:
          nullable: true
          example: null
        Errors:
          type: array
          items:
            type: string
            example: null

    ApiError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Invalid email or password
        statusCode:
          type: integer
          example: 400
        errors:
          type: array
          items:
            type: string
          example: []

    LoginResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            Data:
              type: object
              properties:
                accessToken:
                  type: string
                refreshToken:
                  type: string
                user:
                  type: object
                  properties:
                    UniqueCode:
                      type: string
                      example: USR-AB12CD34
                    Name:
                      type: string
                      example: Firoz Ansari
                    Email:
                      type: string
                      example: firoz@gmail.com
                    Role:
                      type: string
                      example: USER